<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>オフライン | おこづかいクエスト</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: "Hiragino Maru Gothic ProN", system-ui, sans-serif; background: #FFFBEE; color: #4b3a5a; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
      .icon { font-size: 80px; margin-bottom: 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; color: #7a6a8a; line-height: 1.6; }
      button { margin-top: 24px; background: linear-gradient(180deg, #B89CE6, #7C5BC7); color: #fff; border: 0; border-radius: 999px; padding: 12px 28px; font-weight: 800; font-size: 14px; box-shadow: 0 6px 18px -8px rgba(120,90,160,0.4); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">📡</div>
      <h1>オフラインです</h1>
      <p>インターネットに接続できませんでした。<br />接続が戻ったらもう一度ひらいてみてね。</p>
      <button onclick="location.reload()">もう一度よみこむ</button>
    </div>
  </body>
</html>
